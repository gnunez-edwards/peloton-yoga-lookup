name: Update Peloton Data

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update Peloton CSV
        env:
          PELOTON_USERNAME: ${{ secrets.PELOTON_USERNAME }}
          PELOTON_PASSWORD: ${{ secrets.PELOTON_PASSWORD }}
        run: python sync_peloton.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add peloton_yoga_lookup.csv
          git commit -m "Update Peloton yoga data" || echo "No changes to commit"
          git push
